<!DOCTYPE html>
<html>
<head>
  <title>Compare | Control Plane 3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f5f8fc; color: #1F3864; }
    h1,h2 { color: #1F3864; } h2 { color: #2E74B5; border-bottom: 1px solid #dde3ef; padding-bottom: 6px; }
    table { border-collapse: collapse; width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 24px; }
    th { background: #1F3864; color: white; padding: 10px 14px; text-align: left; }
    td { padding: 9px 14px; border-bottom: 1px solid #eef1f7; }
    tr:last-child td { border-bottom: none; }
    .chart-box { background: white; border-radius: 8px; padding: 20px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    a { color: #2E74B5; }
  </style>
</head>
<body>
  <h1>Model Comparison</h1>
  <h2>Pass Rate by Model and Temperature</h2>
  <div class="chart-box"><canvas id="compareChart" height="120"></canvas></div>
  <table>
    <tr><th>Model</th><th>Temperature</th><th>Total</th><th>Passed</th><th>Failed</th><th>Pass Rate</th></tr>
    {% for row in data %}
    <tr>
      <td>{{ row.model }}</td>
      <td>{{ row.temperature }}</td>
      <td>{{ row.total }}</td>
      <td>{{ row.passed }}</td>
      <td>{{ row.failed }}</td>
      <td>{{ row.pass_rate }}%</td>
    </tr>
    {% endfor %}
  </table>
  <p><a href="/">← Back to Home</a></p>
  <script>
    const rows = {{ data | tojson }};
    const labels = rows.map(r => r.model + ' @ ' + r.temperature);
    new Chart(document.getElementById('compareChart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{ label: 'Pass Rate %', data: rows.map(r => r.pass_rate), backgroundColor: '#2E74B5' }]
      },
      options: { scales: { y: { beginAtZero: true, max: 100 } } }
    });
  </script>
</body>
</html>
