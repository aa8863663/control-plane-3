<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MTCP</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
:root{--bg:#0a0c10;--surface:#111318;--surface2:#161920;--border:#1e2229;--accent:#00e5a0;--danger:#ff4f4f;--text:#d4dbe8;--muted:#5a6070;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);
  background-size:40px 40px;}
.box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;width:100%;max-width:360px;}
.brand{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;margin-bottom:4px;}
.brand span{color:var(--accent);}
.sub{font-size:0.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:28px;}
label{display:block;font-size:0.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.74rem;padding:9px 12px;border-radius:4px;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
input:focus{border-color:var(--accent);}
button{width:100%;background:var(--accent);color:#000;border:none;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;padding:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:background 0.15s;}
button:hover{background:#00c88a;}
.error{background:rgba(255,79,79,0.08);border:1px solid rgba(255,79,79,0.25);border-left:3px solid var(--danger);color:var(--text);padding:10px 13px;border-radius:4px;font-size:0.7rem;margin-bottom:16px;line-height:1.5;}
.register-link{text-align:center;margin-top:18px;font-size:0.62rem;color:var(--muted);}
.register-link a{color:var(--accent);text-decoration:none;}
.register-link a:hover{text-decoration:underline;}
.public-link{text-align:center;margin-top:10px;font-size:0.62rem;color:var(--muted);}
.public-link a{color:var(--muted);text-decoration:none;}
.public-link a:hover{color:var(--accent);}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">MTCP<span>.</span></div>
    <div class="sub">AI Assurance Platform</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label>Email</label>
      <input type="email" name="username" autocomplete="email" required>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In →</button>
    </form>
    <div class="register-link"><a href="/register">Request access</a></div>
    <div class="public-link"><a href="/landing">← View public benchmark</a></div>
  </div>
</body>
</html>
