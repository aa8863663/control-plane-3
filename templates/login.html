<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Control Plane 3</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
:root {
  --bg:#0a0c10; --surface:#111318; --surface2:#161920;
  --border:#1e2229; --accent:#00e5a0; --danger:#ff4f4f;
  --text:#d4dbe8; --muted:#5a6070;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background-image:
    linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}
.wrap { width: 100%; max-width: 360px; padding: 24px; }
.brand { text-align: center; margin-bottom: 36px; }
.brand-name { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: #fff; }
.brand-name span { color: var(--accent); }
.brand-sub { font-size: 0.62rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 28px; }
.field { margin-bottom: 18px; }
label { font-size: 0.6rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 7px; display: block; }
input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 0.76rem; padding: 11px 13px; border-radius: 4px;
  width: 100%; outline: none; transition: border-color 0.15s;
}
input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%; padding: 12px;
  background: var(--accent); color: #000; border: none;
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; cursor: pointer;
  transition: background 0.15s; margin-top: 8px;
}
.btn-login:hover { background: #00c88a; }
.error { background: rgba(255,79,79,0.06); border: 1px solid rgba(255,79,79,0.2); border-left: 3px solid var(--danger); color: var(--text); padding: 10px 13px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 18px; }
.footer-note { text-align: center; margin-top: 20px; font-size: 0.6rem; color: var(--muted); line-height: 1.8; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
.wrap { animation: fadeUp 0.45s ease forwards; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-name">Control Plane <span>3</span></div>
      <div class="brand-sub">MTCP Safety Evaluation Platform</div>
    </div>
    <div class="card">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="admin" autocomplete="username" autofocus>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
      </form>
    </div>
    <div class="footer-note">
      © 2026 A. Abby · All Rights Reserved<br>
      DOI: 10.17605/OSF.IO/DXGK5
    </div>
  </div>
</body>
</html>
