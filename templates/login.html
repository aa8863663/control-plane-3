<!DOCTYPE html>
<html>
<head>
  <title>Login | Control Plane 3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f8fc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(31,56,100,0.12); padding: 40px; width: 360px; }
    h1 { color: #1F3864; font-size: 22px; margin-bottom: 6px; }
    p { color: #888; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 4px; }
    input { width: 100%; border: 1px solid #dde3ef; border-radius: 6px; padding: 10px 12px; font-size: 14px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #2E74B5; }
    button { width: 100%; background: #1F3864; color: white; border: none; border-radius: 6px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; }
    button:hover { background: #2E74B5; }
    .error { background: #fff0f0; border: 1px solid #e05c5c; color: #c00; border-radius: 6px; padding: 10px 12px; font-size: 13px; margin-bottom: 16px; }
    .register-link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
    .register-link a { color: #2E74B5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Control Plane 3</h1>
    <p>LLM Safety Benchmarking Platform</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In</button>
    </form>
    <div class="register-link"><a href="/register">Create an account</a></div>
  </div>
</body>
</html>
