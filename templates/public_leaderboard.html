<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTCP Benchmark — Redirecting</title>
  <meta http-equiv="refresh" content="0;url=/evidence/public-findings"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0c10;--surface:#111318;--border:#1e2330;--accent:#00e5a0;--text:#d4dbe8;--muted:#5a6070}
    body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:13px;
      display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .msg{text-align:center;padding:40px;}
    .msg h1{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;margin-bottom:12px;}
    .msg p{color:var(--muted);font-size:0.78rem;margin-bottom:20px;}
    .msg a{color:var(--accent);text-decoration:none;font-size:0.78rem;border:1px solid rgba(0,229,160,0.3);
      padding:8px 18px;border-radius:4px;}
    .msg a:hover{background:rgba(0,229,160,0.08);}
  </style>
</head>
<body>
  <div class="msg">
    <h1>MTCP Benchmark</h1>
    <p>Redirecting to the benchmark evidence page...</p>
    <a href="/evidence/public-findings">View Benchmark →</a>
  </div>
</body>
</html>
