<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Control Plane 3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Serif+Display&display=swap');
:root{--bg:#0a0c10;--surface:#111318;--surface2:#161920;--border:#1e2229;--accent:#00e5a0;--danger:#ff4f4f;--text:#d4dbe8;--muted:#5a6070;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px);background-size:40px 40px;}
.wrap{width:100%;max-width:340px;padding:24px;}
.brand{text-align:center;margin-bottom:32px;}
.brand-name{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;}
.brand-name span{color:var(--accent);}
.brand-sub{font-size:0.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:5px;}
.brand-doi{font-size:0.58rem;color:var(--muted);margin-top:6px;opacity:0.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:26px;}
.field{margin-bottom:16px;}
label{font-size:0.58rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.74rem;padding:10px 12px;border-radius:4px;width:100%;outline:none;transition:border-color 0.15s;}
input:focus{border-color:var(--accent);}
.btn-register{width:100%;padding:11px;background:var(--accent);color:#000;border:none;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background 0.15s;margin-top:6px;}
.btn-register:hover{background:#00c88a;}
.error{background:rgba(255,79,79,0.06);border:1px solid rgba(255,79,79,0.2);border-left:3px solid var(--danger);color:var(--text);padding:10px 13px;border-radius:4px;font-size:0.68rem;margin-bottom:16px;line-height:1.6;}
.success{background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.2);border-left:3px solid var(--accent);color:var(--text);padding:10px 13px;border-radius:4px;font-size:0.68rem;margin-bottom:16px;line-height:1.6;}
.footer-note{text-align:center;margin-top:20px;font-size:0.58rem;color:var(--muted);line-height:2;}
.footer-note a{color:var(--accent);text-decoration:none;}
.footer-note a:hover{text-decoration:underline;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.wrap{animation:fadeUp 0.45s ease forwards;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Control Plane <span>3</span></div>
    <div class="brand-sub">MTCP Safety Evaluation Platform</div>
    <div class="brand-doi">DOI: 10.17605/OSF.IO/DXGK5 · v1.4.1</div>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if success %}<div class="success">{{ success }}</div>{% endif %}
    <form method="post" action="/register">
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="username" autocomplete="username" autofocus required></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="••••••••" autocomplete="new-password" required></div>
      <div class="field"><label>Confirm Password</label><input type="password" name="confirm" placeholder="••••••••" autocomplete="new-password" required></div>
      <button type="submit" class="btn-register">Create Account →</button>
    </form>
  </div>
  <div class="footer-note">Already have an account? <a href="/login">Sign in</a><br>© 2026 A. Abby · Authorised access only</div>
</div>
</body>
</html>
