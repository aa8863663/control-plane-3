{% extends "base.html" %}
{% block title %}Actuarial Analysis — MTCP{% endblock %}
{% block content %}
<div class="page-header fade-up">
  <h1>Actuarial <span>Analysis</span></h1>
  <p>Temperature stability and failure classification across all 25 models</p>
</div>

<style>
.act-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.act-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;}
.act-summary-val{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;}
.act-summary-lbl{font-size:0.6rem;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-top:6px;}

.act-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.act-filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:6px 14px;
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;transition:all 0.15s;}
.act-filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,0.06);}
.act-filter-btn:hover{border-color:var(--text);color:var(--text);}

.act-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.act-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;transition:border-color 0.15s;}
.act-card:hover{border-color:var(--border2);}
.act-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:8px;}
.act-model-name{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#fff;word-break:break-all;line-height:1.4;}
.act-badges{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.act-class-badge{font-size:0.55rem;padding:3px 7px;border-radius:3px;letter-spacing:0.8px;text-transform:uppercase;white-space:nowrap;}
.badge-arch{background:rgba(59,158,255,0.1);color:var(--blue);border:1px solid rgba(59,158,255,0.2);}
.badge-stoch{background:rgba(245,166,35,0.1);color:var(--warn);border:1px solid rgba(245,166,35,0.2);}

.act-bars{display:flex;flex-direction:column;gap:7px;}
.act-bar-row{display:flex;align-items:center;gap:8px;}
.act-bar-label{font-size:0.6rem;color:var(--muted);width:36px;flex-shrink:0;}
.act-bar-track{flex:1;height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;}
.act-bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}
.act-bar-val{font-size:0.6rem;color:var(--text);width:34px;text-align:right;flex-shrink:0;}

.act-variance-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;
  padding-top:10px;border-top:1px solid var(--border);font-size:0.62rem;color:var(--muted);}

@media(max-width:600px){
  .act-summary{grid-template-columns:1fr 1fr;}
  .act-grid{grid-template-columns:1fr;}
}
</style>

<div class="act-summary fade-up fade-up-1" id="actSummary">
  <div class="act-summary-card"><div class="act-summary-val" id="sumModels">—</div><div class="act-summary-lbl">Models</div></div>
  <div class="act-summary-card"><div class="act-summary-val" id="sumArch">—</div><div class="act-summary-lbl">Architectural</div></div>
  <div class="act-summary-card"><div class="act-summary-val" id="sumStoch">—</div><div class="act-summary-lbl">Stochastic</div></div>
  <div class="act-summary-card"><div class="act-summary-val" id="sumAvg">—</div><div class="act-summary-lbl">Avg Pass Rate</div></div>
</div>

<div class="act-filters fade-up fade-up-2">
  <button class="act-filter-btn active" onclick="filter('all',this)">All</button>
  <button class="act-filter-btn" onclick="filter('arch',this)">Architectural</button>
  <button class="act-filter-btn" onclick="filter('stoch',this)">Stochastic</button>
  <button class="act-filter-btn" onclick="sort('rate',this)">Sort: Pass Rate</button>
  <button class="act-filter-btn" onclick="sort('variance',this)">Sort: Variance</button>
  <button class="act-filter-btn" onclick="sort('name',this)">Sort: Name</button>
</div>

<div class="act-grid fade-up fade-up-3" id="actGrid"></div>

<script>
const raw = {{ rows | tojson }};

// Build model map
const modelMap = {};
raw.forEach(r => {
  const m = r.model;
  const t = parseFloat(r.temperature);
  if (!modelMap[m]) modelMap[m] = {};
  const key = t === 0.0 ? 't0' : t === 0.2 ? 't2' : t === 0.5 ? 't5' : t === 0.8 ? 't8' : null;
  if (key) modelMap[m][key] = parseFloat(r.pass_rate);
});

function gradeOf(p) {
  return p >= 90 ? 'A' : p >= 80 ? 'B' : p >= 70 ? 'C' : p >= 60 ? 'D' : 'F';
}

function barColor(pct) {
  if (pct >= 80) return 'var(--accent)';
  if (pct >= 70) return 'var(--accent2)';
  if (pct >= 60) return 'var(--warn)';
  return 'var(--danger)';
}

// Process models
const models = Object.keys(modelMap).map(m => {
  const d = modelMap[m];
  const vals = [d.t0, d.t2, d.t5, d.t8].filter(v => v !== undefined);
  const variance = vals.length > 1 ? parseFloat((Math.max(...vals) - Math.min(...vals)).toFixed(1)) : 0;
  const avg = vals.length ? parseFloat((vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(1)) : 0;
  return { model: m, d, vals, variance, avg, grade: gradeOf(avg), isArch: variance < 5 };
});

// Summary stats
document.getElementById('sumModels').textContent = models.length;
document.getElementById('sumArch').textContent = models.filter(m=>m.isArch).length;
document.getElementById('sumStoch').textContent = models.filter(m=>!m.isArch).length;
const overallAvg = models.length ? (models.reduce((s,m)=>s+m.avg,0)/models.length).toFixed(1) : 0;
document.getElementById('sumAvg').textContent = overallAvg + '%';

let currentFilter = 'all';
let currentSort = 'rate';

function renderCard(m) {
  const temps = [{k:'t0',l:'T=0.0'},{k:'t2',l:'T=0.2'},{k:'t5',l:'T=0.5'},{k:'t8',l:'T=0.8'}];
  const bars = temps.map(({k,l}) => {
    const v = m.d[k];
    if (v === undefined) return `<div class="act-bar-row">
      <span class="act-bar-label">${l}</span>
      <div class="act-bar-track"></div>
      <span class="act-bar-val" style="color:var(--muted)">—</span>
    </div>`;
    return `<div class="act-bar-row">
      <span class="act-bar-label">${l}</span>
      <div class="act-bar-track"><div class="act-bar-fill" style="width:${v}%;background:${barColor(v)}"></div></div>
      <span class="act-bar-val">${v}%</span>
    </div>`;
  }).join('');

  const gradeColors = {A:'var(--accent)',B:'var(--accent2)',C:'var(--warn)',D:'var(--danger)',F:'#ff8b8b'};
  const gc = gradeColors[m.grade];

  return `<div class="act-card" data-type="${m.isArch?'arch':'stoch'}">
    <div class="act-card-header">
      <div class="act-model-name">${m.model}</div>
      <div class="act-badges">
        <span class="act-class-badge ${m.isArch?'badge-arch':'badge-stoch'}">${m.isArch?'Arch':'Stoch'}</span>
        <span class="grade grade-${m.grade}">${m.grade}</span>
      </div>
    </div>
    <div class="act-bars">${bars}</div>
    <div class="act-variance-row">
      <span>Avg: <strong style="color:${gc}">${m.avg}%</strong></span>
      <span>Variance: <strong style="color:${m.variance>=5?'var(--warn)':'var(--muted)'}">${m.variance}pp</strong></span>
    </div>
  </div>`;
}

function getSorted(f, s) {
  let list = [...models];
  if (f === 'arch') list = list.filter(m => m.isArch);
  if (f === 'stoch') list = list.filter(m => !m.isArch);
  if (s === 'rate') list.sort((a,b) => b.avg - a.avg);
  if (s === 'variance') list.sort((a,b) => b.variance - a.variance);
  if (s === 'name') list.sort((a,b) => a.model.localeCompare(b.model));
  return list;
}

function renderGrid() {
  const list = getSorted(currentFilter, currentSort);
  document.getElementById('actGrid').innerHTML = list.length
    ? list.map(renderCard).join('')
    : '<p style="color:var(--muted);font-size:0.72rem;padding:24px">No models match this filter.</p>';
}

function filter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.act-filter-btn').forEach(b => {
    if (['all','arch','stoch'].includes(b.textContent.toLowerCase().replace('all','all').trim())) {
      b.classList.remove('active');
    }
  });
  btn.classList.add('active');
  renderGrid();
}

function sort(type, btn) {
  currentSort = type;
  document.querySelectorAll('.act-filter-btn').forEach(b => {
    if (b.textContent.startsWith('Sort:')) b.classList.remove('active');
  });
  btn.classList.add('active');
  renderGrid();
}

renderGrid();
</script>
{% endblock %}
