{% extends "base.html" %}
{% block title %}Compare — MTCP{% endblock %}
{% block head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
{% endblock %}
{% block content %}
<div class="page">
  <div class="page-header">
    <div class="card-title">Model Comparison</div>
    <div style="font-size:0.7rem;color:var(--muted);margin-bottom:14px">Pass rate by temperature across all 25 models</div>
  </div>
  <div class="card">
    <canvas id="compareChart" height="60"></canvas>
  </div>
</div>
<script>
const raw = {{ compare_data | tojson }};
const models = [...new Set(raw.map(r => r.model))];
const temps = [0.0, 0.2, 0.5, 0.8];
const palette = ['#00e5a0','#7b6cff','#f5a623','#ff4f4f','#38bdf8','#fb923c','#a3e635','#e879f9','#34d399','#818cf8','#f472b6'];
const datasets = models.map((m,i) => ({
  label: m,
  data: temps.map(t => { const r = raw.find(x => x.model===m && x.temperature===t); return r ? r.pass_rate : null; }),
  borderColor: palette[i % palette.length],
  backgroundColor: palette[i % palette.length] + '20',
  tension: 0.3, fill: false, pointRadius: 5,
}));
new Chart(document.getElementById('compareChart'), {
  type: 'line',
  data: { labels: temps.map(t => 'T='+t), datasets },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: '#d4dbe8', font: { family: 'JetBrains Mono', size: 10 }, boxWidth: 12 } } },
    scales: {
      x: { ticks: { color: '#5a6070', font: { family: 'JetBrains Mono' } }, grid: { color: '#1e2330' } },
      y: { min: 0, max: 100, ticks: { color: '#5a6070', font: { family: 'JetBrains Mono' }, callback: v => v+'%' }, grid: { color: '#1e2330' } }
    }
  }
});
</script>
{% endblock %}
