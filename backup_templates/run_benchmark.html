<!DOCTYPE html>
<html>
<head>
  <title>Run Benchmark | Control Plane 3</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f5f8fc; color: #1F3864; }
    h1 { border-bottom: 3px solid #2E74B5; padding-bottom: 10px; }
    .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 28px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 4px; margin-top: 14px; font-weight: bold; }
    input, select { width: 100%; border: 1px solid #dde3ef; border-radius: 6px; padding: 9px 12px; font-size: 14px; margin-bottom: 4px; }
    input:focus, select:focus { border-color: #2E74B5; outline: none; }
    button { background: #1F3864; color: white; border: none; border-radius: 6px; padding: 12px 28px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; }
    button:hover { background: #2E74B5; }
    .hint { font-size: 12px; color: #888; margin-bottom: 8px; }
    #output { background: #1a1a2e; color: #a8d8a8; font-family: monospace; font-size: 13px; padding: 16px; border-radius: 8px; min-height: 80px; white-space: pre-wrap; display: none; margin-top: 16px; }
    .spinner { display: none; margin-top: 12px; color: #2E74B5; font-size: 14px; }
    a { color: #2E74B5; }
  </style>
</head>
<body>
  <h1>Run Benchmark</h1>
  <div class="card">
    <label>Dataset</label>
    <select id="data">
      <option value="probes_200.json">probes_200.json (Full dataset — 105 probes)</option>
    </select>

    <label>API Provider</label>
    <select id="api">
      <option value="groq">Groq</option>
      <option value="openai">OpenAI</option>
    </select>

    <label>Model</label>
    <input type="text" id="model" value="mixtral-8x7b-32768" placeholder="e.g. mixtral-8x7b-32768">
    <div class="hint">Groq models: mixtral-8x7b-32768, llama3-8b-8192, gemma-7b-it</div>

    <label>Temperature(s)</label>
    <input type="text" id="temperature" value="0.0" placeholder="e.g. 0.0 or 0.0,0.5,1.0">
    <div class="hint">Comma-separated for multiple runs</div>

    <label>Repetitions per temperature</label>
    <input type="number" id="runs" value="1" min="1" max="10">

    <button onclick="runBenchmark()">▶ Run Benchmark</button>
    <div class="spinner" id="spinner">⏳ Running benchmark... this may take a few minutes.</div>
    <div id="output"></div>
  </div>
  <p><a href="/">← Back to Home</a></p>

  <script>
    async function runBenchmark() {
      const btn = document.querySelector('button');
      const spinner = document.getElementById('spinner');
      const output = document.getElementById('output');
      btn.disabled = true;
      spinner.style.display = 'block';
      output.style.display = 'none';

      try {
        const resp = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            data: document.getElementById('data').value,
            api: document.getElementById('api').value,
            model: document.getElementById('model').value,
            temperature: parseFloat(document.getElementById('temperature').value.split(',')[0]),
            runs: parseInt(document.getElementById('runs').value)
          })
        });
        const data = await resp.json();
        output.style.display = 'block';
        if (data.success) {
          output.textContent = '✅ Benchmark complete!\n\n' + data.stdout;
        } else {
          output.style.color = '#ff6b6b';
          output.textContent = '❌ Error:\n\n' + data.stderr;
        }
      } catch(e) {
        output.style.display = 'block';
        output.textContent = '❌ Request failed: ' + e.message;
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
